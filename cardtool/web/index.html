<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Nexus Revival — Card Search</title>
<style>
  :root {
    --bg:#12141c; --panel:#1b1e2b; --panel2:#232838; --line:#2f3547;
    --txt:#e6e8ef; --dim:#9aa2b8; --accent:#f0b429; --accent2:#4f7cff;
    --mon:#c8933b; --spell:#1d9a8a; --trap:#b5427f;
  }
  * { box-sizing:border-box; }
  body { margin:0; background:var(--bg); color:var(--txt);
    font:14px/1.45 system-ui,-apple-system,Segoe UI,Roboto,sans-serif; }
  header { position:sticky; top:0; z-index:5; background:var(--panel);
    border-bottom:1px solid var(--line); padding:10px 16px; display:flex;
    align-items:center; gap:14px; flex-wrap:wrap; }
  header h1 { font-size:16px; margin:0; color:var(--accent); white-space:nowrap; }
  #q { flex:1; min-width:220px; background:var(--panel2); border:1px solid var(--line);
    color:var(--txt); padding:9px 12px; border-radius:8px; font-size:15px; }
  #q:focus { outline:none; border-color:var(--accent2); }
  #count { color:var(--dim); font-size:13px; white-space:nowrap; }
  .layout { display:grid; grid-template-columns:250px 1fr; gap:0; }
  aside { border-right:1px solid var(--line); padding:14px; height:calc(100vh - 57px);
    overflow-y:auto; position:sticky; top:57px; }
  .fg { margin-bottom:16px; }
  .fg h3 { margin:0 0 7px; font-size:11px; letter-spacing:.08em; text-transform:uppercase;
    color:var(--dim); font-weight:600; }
  .chips { display:flex; flex-wrap:wrap; gap:5px; }
  .chip { background:var(--panel2); border:1px solid var(--line); color:var(--dim);
    padding:3px 9px; border-radius:12px; cursor:pointer; font-size:12px; user-select:none; }
  .chip:hover { border-color:var(--accent2); }
  .chip.on { background:var(--accent2); border-color:var(--accent2); color:#fff; }
  .range { display:flex; align-items:center; gap:6px; }
  .range input { width:100%; background:var(--panel2); border:1px solid var(--line);
    color:var(--txt); padding:5px 7px; border-radius:6px; }
  .range span { color:var(--dim); }
  button.reset { width:100%; background:var(--panel2); border:1px solid var(--line);
    color:var(--txt); padding:8px; border-radius:8px; cursor:pointer; }
  button.reset:hover { border-color:var(--accent); color:var(--accent); }
  label.toggle { display:flex; align-items:center; gap:8px; color:var(--dim); cursor:pointer; }
  label.toggle.disabled { opacity:.5; cursor:not-allowed; }
  main { height:calc(100vh - 57px); overflow-y:auto; }
  table { width:100%; border-collapse:collapse; }
  thead th { position:sticky; top:0; background:var(--panel); text-align:left;
    padding:8px 10px; font-size:11px; letter-spacing:.05em; text-transform:uppercase;
    color:var(--dim); border-bottom:1px solid var(--line); cursor:pointer; white-space:nowrap; }
  thead th:hover { color:var(--accent); }
  tbody tr { border-bottom:1px solid var(--line); cursor:pointer; }
  tbody tr:hover { background:var(--panel2); }
  td { padding:7px 10px; vertical-align:top; }
  td.name { font-weight:600; }
  td.num { text-align:right; font-variant-numeric:tabular-nums; color:var(--dim); }
  .badge { display:inline-block; padding:1px 7px; border-radius:10px; font-size:11px;
    font-weight:600; }
  .t-Monster { background:rgba(200,147,59,.18); color:var(--mon); }
  .t-Spell { background:rgba(29,154,138,.18); color:var(--spell); }
  .t-Trap { background:rgba(181,66,127,.2); color:var(--trap); }
  .sub { color:var(--dim); font-size:12px; }
  .more { padding:16px; text-align:center; color:var(--dim); }
  /* detail modal */
  #detail { position:fixed; inset:0; background:rgba(0,0,0,.55); display:none;
    align-items:center; justify-content:center; z-index:20; }
  #detail.show { display:flex; }
  .card { background:var(--panel); border:1px solid var(--line); border-radius:12px;
    max-width:560px; width:92%; max-height:86vh; overflow-y:auto; padding:22px; }
  .card h2 { margin:0 0 4px; }
  .card .meta { color:var(--dim); margin-bottom:14px; }
  .card .stats { display:flex; gap:18px; flex-wrap:wrap; margin:12px 0; padding:12px 0;
    border-top:1px solid var(--line); border-bottom:1px solid var(--line); }
  .card .stats div span { display:block; font-size:11px; color:var(--dim);
    text-transform:uppercase; letter-spacing:.05em; }
  .card .stats div b { font-size:16px; }
  .card .effect { white-space:pre-wrap; line-height:1.55; }
  .card .pw { margin-top:14px; color:var(--dim); font-size:12px; }
</style>
</head>
<body>
<header>
  <h1>◆ Nexus Revival</h1>
  <input id="q" type="search" placeholder="Search name or effect text…  (multiple words = AND)" autofocus>
  <span id="count"></span>
</header>
<div class="layout">
  <aside id="filters"></aside>
  <main>
    <table>
      <thead><tr id="head"></tr></thead>
      <tbody id="rows"></tbody>
    </table>
    <div class="more" id="more"></div>
  </main>
</div>
<div id="detail"><div class="card" id="detailCard"></div></div>

<script src="cards.js"></script>
<script>
const DB = window.CARD_DB;
if (!DB) document.body.innerHTML = '<p style="padding:24px">cards.js not found. Run <code>python cardtool/extract.py</code> first.</p>';
const CARDS = DB ? DB.cards : [];
CARDS.forEach(c => { c._s = (c.name + '\n' + (c.effect||'')).toLowerCase(); });

const CAP = 500;                     // max rows rendered at once
const ATTRS = ['LIGHT','DARK','WATER','FIRE','EARTH','WIND','DIVINE'];
const uniq = k => [...new Set(CARDS.map(c => c[k]).filter(Boolean))];
const RACES = uniq('race').sort();
const KINDS = uniq('kind').sort();
const ICONS = uniq('icon').sort();

const S = { q:'', types:new Set(), attrs:new Set(), races:new Set(), kinds:new Set(),
  icons:new Set(), lvMin:'', lvMax:'', atkMin:'', atkMax:'', defMin:'', defMax:'',
  sort:'name', dir:1 };

// ---- filters UI ----
function chipGroup(title, values, set) {
  const wrap = document.createElement('div'); wrap.className = 'fg';
  wrap.innerHTML = `<h3>${title}</h3>`;
  const box = document.createElement('div'); box.className = 'chips';
  values.forEach(v => {
    const c = document.createElement('span'); c.className = 'chip'; c.textContent = v;
    c.onclick = () => { c.classList.toggle('on'); set.has(v) ? set.delete(v) : set.add(v); render(); };
    box.appendChild(c);
  });
  wrap.appendChild(box); return wrap;
}
function rangeGroup(title, key) {
  const wrap = document.createElement('div'); wrap.className = 'fg';
  wrap.innerHTML = `<h3>${title}</h3>`;
  const r = document.createElement('div'); r.className = 'range';
  const mk = suf => { const i = document.createElement('input'); i.type='number'; i.placeholder=suf;
    i.oninput = () => { S[key+(suf==='min'?'Min':'Max')] = i.value; render(); }; return i; };
  r.append(mk('min'), Object.assign(document.createElement('span'),{textContent:'–'}), mk('max'));
  wrap.appendChild(r); return wrap;
}
function buildFilters() {
  const f = document.getElementById('filters');
  f.append(
    chipGroup('Card type', ['Monster','Spell','Trap'], S.types),
    chipGroup('Attribute', ATTRS, S.attrs),
    rangeGroup('Level', 'lv'),
    rangeGroup('ATK', 'atk'),
    rangeGroup('DEF', 'def'),
    chipGroup('Monster type', RACES, S.races),
    chipGroup('Kind', KINDS, S.kinds),
    chipGroup('Spell/Trap icon', ICONS, S.icons),
  );
  const og = document.createElement('div'); og.className = 'fg';
  og.innerHTML = `<h3>Collection</h3>`;
  const lab = document.createElement('label'); lab.className = 'toggle disabled';
  lab.title = 'Import a save file to enable (coming soon)';
  lab.innerHTML = `<input type="checkbox" disabled> Owned only`;
  og.appendChild(lab); f.appendChild(og);
  const rst = document.createElement('button'); rst.className = 'reset'; rst.textContent = 'Reset filters';
  rst.onclick = reset; f.appendChild(rst);
}
function reset() {
  Object.assign(S, { types:new Set(), attrs:new Set(), races:new Set(), kinds:new Set(),
    icons:new Set(), lvMin:'', lvMax:'', atkMin:'', atkMax:'', defMin:'', defMax:'' });
  document.getElementById('filters').innerHTML = '';
  document.querySelectorAll('#filters input').forEach(i => i.value='');
  buildFilters(); render();
}

// ---- filtering ----
function inRange(v, lo, hi) {
  if (lo === '' && hi === '') return true;
  if (typeof v !== 'number') return false;         // "?" or null excluded when a bound is set
  if (lo !== '' && v < +lo) return false;
  if (hi !== '' && v > +hi) return false;
  return true;
}
function match(c) {
  if (S.q) { for (const w of S.q.split(/\s+/)) if (w && !c._s.includes(w)) return false; }
  if (S.types.size && !S.types.has(c.cardType)) return false;
  if (S.attrs.size && !S.attrs.has(c.attribute)) return false;
  if (S.races.size && !S.races.has(c.race)) return false;
  if (S.kinds.size && !S.kinds.has(c.kind)) return false;
  if (S.icons.size && !S.icons.has(c.icon)) return false;
  if (!inRange(c.level, S.lvMin, S.lvMax)) return false;
  if (!inRange(c.atk, S.atkMin, S.atkMax)) return false;
  if (!inRange(c.def, S.defMin, S.defMax)) return false;
  return true;
}

// ---- table ----
const COLS = [
  { k:'name', label:'Name' }, { k:'cardType', label:'Type' },
  { k:'attribute', label:'Attr' }, { k:'race', label:'Race' },
  { k:'kind', label:'Kind' }, { k:'level', label:'Lv', num:true },
  { k:'atk', label:'ATK', num:true }, { k:'def', label:'DEF', num:true },
];
function buildHead() {
  document.getElementById('head').innerHTML = COLS.map(c =>
    `<th data-k="${c.k}">${c.label}</th>`).join('');
  document.querySelectorAll('#head th').forEach(th => th.onclick = () => {
    const k = th.dataset.k; S.dir = (S.sort === k) ? -S.dir : 1; S.sort = k; render();
  });
}
const sortKey = (c, k) => { const v = c[k]; return v == null ? (COLS.find(x=>x.k===k)?.num ? -1 : '') : (v === '?' ? Infinity : v); };
function render() {
  S.q = document.getElementById('q').value.trim().toLowerCase();
  let list = CARDS.filter(match);
  list.sort((a,b) => { const x=sortKey(a,S.sort), y=sortKey(b,S.sort);
    return (x<y?-1:x>y?1:0) * S.dir; });
  document.getElementById('count').textContent =
    `${list.length.toLocaleString()} / ${CARDS.length.toLocaleString()} cards`;
  const shown = list.slice(0, CAP);
  document.getElementById('rows').innerHTML = shown.map((c,i) => {
    const attr = c.attribute ? `<span class="sub">${c.attribute}</span>` : '';
    return `<tr data-i="${c.idx}">
      <td class="name">${esc(c.name)}</td>
      <td><span class="badge t-${c.cardType}">${c.cardType}</span></td>
      <td>${attr}</td><td class="sub">${c.race||''}</td>
      <td class="sub">${c.kind}${c.tuner && !c.kind.includes('Tuner')?' · Tuner':''}</td>
      <td class="num">${c.level??''}</td>
      <td class="num">${c.atk??''}</td><td class="num">${c.def??''}</td>
    </tr>`; }).join('');
  document.getElementById('more').textContent =
    list.length > CAP ? `Showing first ${CAP} — refine your search to see the rest.` : '';
  document.querySelectorAll('#rows tr').forEach(tr =>
    tr.onclick = () => showDetail(CARDS.find(c => c.idx == tr.dataset.i)));
}
function esc(s){ return s.replace(/[&<>]/g, m => ({'&':'&amp;','<':'&lt;','>':'&gt;'}[m])); }

// ---- detail ----
function showDetail(c) {
  const line = c.cardType === 'Monster'
    ? [c.attribute, c.race, c.kind + (c.tuner && !c.kind.includes('Tuner') ? '/Tuner' : '')].filter(Boolean).join(' · ')
    : [c.cardType, c.icon].filter(Boolean).join(' · ');
  const stats = c.cardType === 'Monster'
    ? `<div class="stats">
         <div><span>Level</span><b>${c.level ?? '—'}</b></div>
         <div><span>ATK</span><b>${c.atk ?? '—'}</b></div>
         <div><span>DEF</span><b>${c.def ?? '—'}</b></div></div>` : '';
  document.getElementById('detailCard').innerHTML = `
    <h2>${esc(c.name)}</h2>
    <div class="meta"><span class="badge t-${c.cardType}">${c.cardType}</span> &nbsp; ${line}</div>
    ${stats}
    <div class="effect">${esc(c.effect || '')}</div>
    <div class="pw">${c.password ? 'Password ' + String(c.password).padStart(8,'0') : 'No password'} &nbsp;·&nbsp; id ${c.id}${c.pack ? ' · pack ' + c.pack : ''}</div>`;
  document.getElementById('detail').classList.add('show');
}
document.getElementById('detail').onclick = e => {
  if (e.target.id === 'detail') e.target.classList.remove('show');
};

// ---- init ----
if (DB) {
  buildFilters(); buildHead();
  const q = document.getElementById('q');
  let t; q.oninput = () => { clearTimeout(t); t = setTimeout(render, 90); };
  document.addEventListener('keydown', e => {
    if (e.key === 'Escape') {
      if (document.getElementById('detail').classList.contains('show'))
        document.getElementById('detail').classList.remove('show');
      else { q.value=''; render(); q.focus(); }
    }
  });
  render();
}
</script>
</body>
</html>
