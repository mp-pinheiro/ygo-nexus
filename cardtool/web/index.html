<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Nexus Revival — Card Search</title>
<style>
  :root {
    --bg:#12141c; --panel:#1b1e2b; --panel2:#232838; --line:#2f3547;
    --txt:#e6e8ef; --dim:#9aa2b8; --accent:#f0b429; --accent2:#4f7cff;
    --mon:#c8933b; --spell:#1d9a8a; --trap:#b5427f;
  }
  * { box-sizing:border-box; }
  body { margin:0; background:var(--bg); color:var(--txt); height:100vh;
    display:flex; flex-direction:column; overflow:hidden;
    font:14px/1.45 system-ui,-apple-system,Segoe UI,Roboto,sans-serif; }
  header { flex:0 0 auto; background:var(--panel);
    border-bottom:1px solid var(--line); padding:10px 16px; display:flex;
    align-items:center; gap:12px 14px; flex-wrap:wrap; }
  header h1 { font-size:16px; margin:0; color:var(--accent); white-space:nowrap; }
  #q { flex:1; min-width:220px; background:var(--panel2); border:1px solid var(--line);
    color:var(--txt); padding:9px 12px; border-radius:8px; font-size:15px; }
  #q:focus { outline:none; border-color:var(--accent2); }
  #count { color:var(--dim); font-size:13px; white-space:nowrap; }
  .searchin { flex-basis:100%; display:flex; align-items:center; flex-wrap:wrap; gap:6px; }
  .searchin .lbl { color:var(--dim); font-size:12px; }
  .layout { flex:1 1 auto; min-height:0; display:grid; grid-template-columns:250px 1fr; }
  aside { border-right:1px solid var(--line); padding:14px; overflow-y:auto; }
  .fg { margin-bottom:16px; }
  .fg h3 { margin:0 0 7px; font-size:11px; letter-spacing:.08em; text-transform:uppercase;
    color:var(--dim); font-weight:600; }
  .chips { display:flex; flex-wrap:wrap; gap:5px; }
  .chip { background:var(--panel2); border:1px solid var(--line); color:var(--dim);
    padding:3px 9px; border-radius:12px; cursor:pointer; font-size:12px; user-select:none; }
  .chip:hover { border-color:var(--accent2); }
  .chip.on { background:var(--accent2); border-color:var(--accent2); color:#fff; }
  .chip.act { border-color:var(--accent); color:var(--accent); }
  .range { display:flex; align-items:center; gap:6px; }
  .range input { width:100%; background:var(--panel2); border:1px solid var(--line);
    color:var(--txt); padding:5px 7px; border-radius:6px; }
  .range span { color:var(--dim); }
  button.reset { width:100%; background:var(--panel2); border:1px solid var(--line);
    color:var(--txt); padding:8px; border-radius:8px; cursor:pointer; }
  button.reset:hover { border-color:var(--accent); color:var(--accent); }
  label.toggle { display:flex; align-items:center; gap:8px; color:var(--dim); cursor:pointer; }
  label.toggle.disabled { opacity:.5; cursor:not-allowed; }
  main { overflow:auto; }
  table { width:100%; border-collapse:collapse; }
  thead th { position:sticky; top:0; background:var(--panel); text-align:left;
    padding:8px 10px; font-size:11px; letter-spacing:.05em; text-transform:uppercase;
    color:var(--dim); border-bottom:1px solid var(--line); cursor:pointer; white-space:nowrap; }
  thead th:hover { color:var(--accent); }
  thead th.sorted { color:var(--accent); }
  .ind { color:var(--dim); font-size:10px; margin-left:2px; }
  th.sorted .ind { color:var(--accent); }
  tbody tr { border-bottom:1px solid var(--line); cursor:pointer; }
  tbody tr:hover { background:var(--panel2); }
  td { padding:7px 10px; vertical-align:top; }
  td.name { font-weight:600; }
  td.num { text-align:right; font-variant-numeric:tabular-nums; color:var(--dim); }
  .eff { max-width:520px; white-space:pre-wrap; color:var(--dim); font-size:12.5px; }
  .badge { display:inline-block; padding:1px 7px; border-radius:10px; font-size:11px;
    font-weight:600; }
  .t-Monster { background:rgba(200,147,59,.18); color:var(--mon); }
  .t-Spell { background:rgba(29,154,138,.18); color:var(--spell); }
  .t-Trap { background:rgba(181,66,127,.2); color:var(--trap); }
  .sub { color:var(--dim); font-size:12px; }
  .more { padding:16px; text-align:center; color:var(--dim); }
  /* hover card preview */
  #preview { position:fixed; width:176px; border-radius:9px; display:none; z-index:40;
    pointer-events:none; border:1px solid var(--line); background:var(--panel2);
    box-shadow:0 6px 26px rgba(0,0,0,.7); }
  /* detail modal */
  #detail { position:fixed; inset:0; background:rgba(0,0,0,.55); display:none;
    align-items:center; justify-content:center; z-index:20; }
  #detail.show { display:flex; }
  .card { background:var(--panel); border:1px solid var(--line); border-radius:12px;
    max-width:840px; width:94%; max-height:90vh; overflow-y:auto; padding:24px; }
  .dwrap { display:flex; gap:22px; align-items:flex-start; }
  .cardimg { width:260px; border-radius:9px; flex-shrink:0; background:var(--panel2); cursor:zoom-in; }
  .dtext { flex:1; min-width:0; }
  .card h2 { margin:0 0 4px; }
  .card .meta { color:var(--dim); margin-bottom:14px; }
  .card .stats { display:flex; gap:18px; flex-wrap:wrap; margin:12px 0; padding:12px 0;
    border-top:1px solid var(--line); border-bottom:1px solid var(--line); }
  .card .stats div span { display:block; font-size:11px; color:var(--dim);
    text-transform:uppercase; letter-spacing:.05em; }
  .card .stats div b { font-size:16px; }
  .card .effect { white-space:pre-wrap; line-height:1.55; }
  .dmeta { display:flex; flex-wrap:wrap; gap:8px; margin-top:18px;
    border-top:1px solid var(--line); padding-top:16px; }
  .pill { background:var(--panel2); border:1px solid var(--line); border-radius:8px;
    padding:4px 10px; font-size:12px; color:var(--dim); }
  .pill b { color:var(--txt); font-weight:600; margin-right:6px; }
  #zoom { position:fixed; inset:0; background:rgba(0,0,0,.85); display:none;
    align-items:center; justify-content:center; z-index:50; cursor:zoom-out; }
  #zoom.show { display:flex; }
  #zoom img { max-width:92vw; max-height:92vh; border-radius:10px; box-shadow:0 8px 40px rgba(0,0,0,.8); }
  .packpill { cursor:help; }
  #packpop { position:fixed; z-index:45; width:320px; max-height:70vh; display:none;
    flex-direction:column; background:var(--panel); border:1px solid var(--line);
    border-radius:10px; box-shadow:0 10px 34px rgba(0,0,0,.65); overflow:hidden; }
  #packpop.show { display:flex; }
  .pp-head { display:flex; gap:12px; padding:12px; border-bottom:1px solid var(--line); }
  .pp-head img { width:72px; height:144px; image-rendering:pixelated; border-radius:5px;
    background:var(--panel2); flex-shrink:0; object-fit:contain; }
  .pp-title { font-weight:600; line-height:1.3; }
  .pp-sub { color:var(--dim); font-size:12px; margin-top:4px; }
  .pp-list { overflow-y:auto; padding:4px 0; }
  .pp-row { display:flex; align-items:center; gap:8px; padding:4px 12px; cursor:pointer; font-size:12.5px; }
  .pp-row:hover { background:var(--panel2); }
  .pp-row.cur { background:rgba(240,180,41,.16); }
  .pp-row .nm { flex:1; overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }
  .rr { font-size:10px; font-weight:700; padding:1px 0; border-radius:4px; flex-shrink:0;
    width:26px; text-align:center; }
  .rr-C { background:#3a3f52; color:#c7cde0; } .rr-R { background:#26456e; color:#8fbaff; }
  .rr-S { background:#2b5c55; color:#7fe6d3; } .rr-U { background:#6e5518; color:#f0c869; }
  @media (max-width:640px) { .dwrap { flex-direction:column; } .cardimg { width:180px; } }
</style>
</head>
<body>
<header>
  <h1>◆ Nexus Revival</h1>
  <input id="q" type="search" placeholder="Search…  (multiple words = AND)" autofocus>
  <span id="count"></span>
  <div class="searchin" id="searchin"></div>
</header>
<div class="layout">
  <aside id="filters"></aside>
  <main>
    <table>
      <thead><tr id="head"></tr></thead>
      <tbody id="rows"></tbody>
    </table>
    <div class="more" id="more"></div>
  </main>
</div>
<img id="preview" alt="">
<div id="detail"><div class="card" id="detailCard"></div></div>
<div id="zoom"></div>
<div id="packpop"></div>

<script src="cards.js"></script>
<script>
const DB = window.CARD_DB;
if (!DB) document.body.innerHTML = '<p style="padding:24px">cards.js not found. Run <code>python cardtool/extract.py</code> first.</p>';
const CARDS = DB ? DB.cards : [];
const SEARCH_FIELDS = [
  ['name','Name', c => c.name],
  ['effect','Effect', c => c.effect],
  ['cardType','Card type', c => c.cardType],
  ['kind','Kind', c => c.kind],
  ['attribute','Attribute', c => c.attribute],
  ['race','Race', c => c.race],
  ['icon','Icon', c => c.icon],
  ['level','Level', c => c.level],
  ['atk','ATK', c => c.atk],
  ['def','DEF', c => c.def],
  ['password','Password', c => c.password],
  ['pack','Pack', c => c.pack],
];
CARDS.forEach(c => {
  c._f = {};
  for (const [k, , get] of SEARCH_FIELDS) c._f[k] = String(get(c) ?? '').toLowerCase();
});
const BYIDX = new Map(CARDS.map(c => [c.idx, c]));
const PACKS = DB ? (DB.packs || {}) : {};
const PACK_CARDS = {};
CARDS.forEach(c => { if (c.pack) (PACK_CARDS[c.pack] ||= []).push(c); });
const RARITY_RANK = { 'Ultra Rare': 0, 'Super Rare': 1, 'Rare': 2, 'Common': 3 };
const RARITY_BADGE = { 'Common': ['C', 'rr-C'], 'Rare': ['R', 'rr-R'], 'Super Rare': ['SR', 'rr-S'], 'Ultra Rare': ['UR', 'rr-U'] };

const CAP = 500;                     // max rows rendered at once
const ATTRS = ['LIGHT','DARK','WATER','FIRE','EARTH','WIND','DIVINE'];
const uniq = k => [...new Set(CARDS.map(c => c[k]).filter(Boolean))];
const RACES = uniq('race').sort();
const KIND_ORDER = ['Normal','Effect','Fusion','Ritual','Synchro','Tuner','Toon','Spirit','Union','Gemini','Token'];
const KINDTAGS = new Set(CARDS.flatMap(c => c.types || []));
const KINDS = KIND_ORDER.filter(t => KINDTAGS.has(t));
const ICONS = uniq('icon').sort();

const SF = {}; SEARCH_FIELDS.forEach(([k]) => SF[k] = (k === 'name' || k === 'effect'));
const S = { q:'', types:new Set(), attrs:new Set(), races:new Set(), kinds:new Set(),
  icons:new Set(), lvMin:'', lvMax:'', atkMin:'', atkMax:'', defMin:'', defMax:'',
  sort:'name', dir:1 };

const imgSmall = c => c.password ? `https://images.ygoprodeck.com/images/cards_small/${c.password}.jpg` : null;
const imgFull  = c => c.password ? `https://images.ygoprodeck.com/images/cards/${c.password}.jpg` : null;
function esc(s){ return String(s).replace(/[&<>"]/g, m => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[m])); }

function buildSearchIn() {
  const el = document.getElementById('searchin');
  el.innerHTML = '<span class="lbl">Search in:</span>';
  SEARCH_FIELDS.forEach(([k, label]) => {
    const c = document.createElement('span');
    c.className = 'chip' + (SF[k] ? ' on' : ''); c.textContent = label;
    c.onclick = () => { SF[k] = !SF[k]; c.classList.toggle('on'); render(); };
    el.appendChild(c);
  });
  const setAll = v => { SEARCH_FIELDS.forEach(([k]) => SF[k] = v); buildSearchIn(); render(); };
  for (const [label, v] of [['all', true], ['none', false]]) {
    const b = document.createElement('span'); b.className = 'chip act'; b.textContent = label;
    b.onclick = () => setAll(v); el.appendChild(b);
  }
}

// ---- filters UI ----
function chipGroup(title, values, set) {
  const wrap = document.createElement('div'); wrap.className = 'fg';
  wrap.innerHTML = `<h3>${title}</h3>`;
  const box = document.createElement('div'); box.className = 'chips';
  values.forEach(v => {
    const c = document.createElement('span'); c.className = 'chip'; c.textContent = v;
    c.onclick = () => { c.classList.toggle('on'); set.has(v) ? set.delete(v) : set.add(v); render(); };
    box.appendChild(c);
  });
  wrap.appendChild(box); return wrap;
}
function rangeGroup(title, key) {
  const wrap = document.createElement('div'); wrap.className = 'fg';
  wrap.innerHTML = `<h3>${title}</h3>`;
  const r = document.createElement('div'); r.className = 'range';
  const mk = suf => { const i = document.createElement('input'); i.type='number'; i.placeholder=suf;
    i.oninput = () => { S[key+(suf==='min'?'Min':'Max')] = i.value; render(); }; return i; };
  r.append(mk('min'), Object.assign(document.createElement('span'),{textContent:'–'}), mk('max'));
  wrap.appendChild(r); return wrap;
}
function buildFilters() {
  const f = document.getElementById('filters');
  f.append(
    chipGroup('Card type', ['Monster','Spell','Trap'], S.types),
    chipGroup('Attribute', ATTRS, S.attrs),
    rangeGroup('Level', 'lv'),
    rangeGroup('ATK', 'atk'),
    rangeGroup('DEF', 'def'),
    chipGroup('Monster type', RACES, S.races),
    chipGroup('Kind', KINDS, S.kinds),
    chipGroup('Spell/Trap icon', ICONS, S.icons),
  );
  const og = document.createElement('div'); og.className = 'fg';
  og.innerHTML = `<h3>Collection</h3>`;
  const lab = document.createElement('label'); lab.className = 'toggle disabled';
  lab.title = 'Import a save file to enable (coming soon)';
  lab.innerHTML = `<input type="checkbox" disabled> Owned only`;
  og.appendChild(lab); f.appendChild(og);
  const rst = document.createElement('button'); rst.className = 'reset'; rst.textContent = 'Reset filters';
  rst.onclick = reset; f.appendChild(rst);
}
function reset() {
  Object.assign(S, { types:new Set(), attrs:new Set(), races:new Set(), kinds:new Set(),
    icons:new Set(), lvMin:'', lvMax:'', atkMin:'', atkMax:'', defMin:'', defMax:'' });
  document.getElementById('filters').innerHTML = '';
  buildFilters(); render();
}

// ---- filtering ----
function inRange(v, lo, hi) {
  if (lo === '' && hi === '') return true;
  if (typeof v !== 'number') return false;         // "?" or null excluded when a bound is set
  if (lo !== '' && v < +lo) return false;
  if (hi !== '' && v > +hi) return false;
  return true;
}
function match(c) {
  if (S.q) {
    let hay = '';
    for (const [k] of SEARCH_FIELDS) if (SF[k]) hay += c._f[k] + '\n';
    for (const w of S.q.split(/\s+/)) if (w && !hay.includes(w)) return false;
  }
  if (S.types.size && !S.types.has(c.cardType)) return false;
  if (S.attrs.size && !S.attrs.has(c.attribute)) return false;
  if (S.races.size && !S.races.has(c.race)) return false;
  if (S.kinds.size && !c.types.some(t => S.kinds.has(t))) return false;
  if (S.icons.size && !S.icons.has(c.icon)) return false;
  if (!inRange(c.level, S.lvMin, S.lvMax)) return false;
  if (!inRange(c.atk, S.atkMin, S.atkMax)) return false;
  if (!inRange(c.def, S.defMin, S.defMax)) return false;
  return true;
}

// ---- table ----
const COLS = [
  { k:'name', label:'Name' }, { k:'cardType', label:'Type' },
  { k:'attribute', label:'Attr' }, { k:'race', label:'Race' },
  { k:'kind', label:'Kind' }, { k:'level', label:'Lv', num:true },
  { k:'atk', label:'ATK', num:true }, { k:'def', label:'DEF', num:true },
  { k:'effect', label:'Effect' },
];
function buildHead() {
  document.getElementById('head').innerHTML = COLS.map(c =>
    `<th data-k="${c.k}">${c.label} <span class="ind"></span></th>`).join('');
  document.querySelectorAll('#head th').forEach(th => th.onclick = () => {
    const k = th.dataset.k; S.dir = (S.sort === k) ? -S.dir : 1; S.sort = k; render();
  });
}
function markSort() {
  document.querySelectorAll('#head th').forEach(th => {
    const active = th.dataset.k === S.sort;
    th.classList.toggle('sorted', active);
    th.querySelector('.ind').textContent = active ? (S.dir === 1 ? '▲' : '▼') : '–';
  });
}
const sortKey = (c, k) => { const v = c[k]; return v == null ? (COLS.find(x=>x.k===k)?.num ? -1 : '') : v; };
function render() {
  S.q = document.getElementById('q').value.trim().toLowerCase();
  let list = CARDS.filter(match);
  list.sort((a,b) => { const x=sortKey(a,S.sort), y=sortKey(b,S.sort);
    return (x<y?-1:x>y?1:0) * S.dir; });
  document.getElementById('count').textContent =
    `${list.length.toLocaleString()} / ${CARDS.length.toLocaleString()} cards`;
  document.getElementById('rows').innerHTML = list.slice(0, CAP).map(c => {
    const attr = c.attribute ? `<span class="sub">${c.attribute}</span>` : '';
    return `<tr data-i="${c.idx}">
      <td class="name">${esc(c.name)}</td>
      <td><span class="badge t-${c.cardType}">${c.cardType}</span></td>
      <td>${attr}</td><td class="sub">${c.race||''}</td>
      <td class="sub">${c.kind}</td>
      <td class="num">${c.level??''}</td>
      <td class="num">${c.atk??''}</td><td class="num">${c.def??''}</td>
      <td><div class="eff">${esc(c.effect || '')}</div></td>
    </tr>`; }).join('');
  document.getElementById('more').textContent =
    list.length > CAP ? `Showing first ${CAP} — refine your search to see the rest.` : '';
  markSort();
}
// ---- detail ----
function showDetail(c) {
  document.getElementById('packpop').classList.remove('show');
  const line = c.cardType === 'Monster'
    ? [c.attribute, c.race, c.kind].filter(Boolean).join(' · ')
    : [c.cardType, c.icon].filter(Boolean).join(' · ');
  const stats = c.cardType === 'Monster'
    ? `<div class="stats">
         <div><span>Level</span><b>${c.level ?? '—'}</b></div>
         <div><span>ATK</span><b>${c.atk ?? '—'}</b></div>
         <div><span>DEF</span><b>${c.def ?? '—'}</b></div></div>` : '';
  const full = imgFull(c);
  const img = full ? `<img class="cardimg" src="${full}" alt="" onclick="openZoom('${full}')" onerror="this.remove()">` : '';
  const meta = [
    c.pack ? `<span class="pill packpill" onmouseenter="packPopEnter(${c.idx}, this)" onmouseleave="packPopLeave()"><b>Pack</b>${esc(c.pack)}</span>` : '',
    c.rarity ? `<span class="pill"><b>Rarity</b>${esc(c.rarity)}</span>` : '',
    c.password ? `<span class="pill"><b>Password</b>${String(c.password).padStart(8,'0')}</span>` : '',
    `<span class="pill"><b>ID</b>${c.id}</span>`,
  ].join('');
  document.getElementById('detailCard').innerHTML = `
    <div class="dwrap">
      ${img}
      <div class="dtext">
        <h2>${esc(c.name)}</h2>
        <div class="meta"><span class="badge t-${c.cardType}">${c.cardType}</span> &nbsp; ${esc(line)}</div>
        ${stats}
        <div class="effect">${esc(c.effect || '')}</div>
        <div class="dmeta">${meta}</div>
      </div>
    </div>`;
  document.getElementById('detail').classList.add('show');
}
function openZoom(url) {
  const z = document.getElementById('zoom');
  z.innerHTML = `<img src="${url}" alt="">`;
  z.classList.add('show');
}

let packTimer;
function packPopEnter(idx, el) {
  clearTimeout(packTimer);
  const code = BYIDX.get(idx).pack, meta = PACKS[code];
  if (!meta) return;
  const list = (PACK_CARDS[code] || []).slice()
    .sort((a, b) => (RARITY_RANK[a.rarity] - RARITY_RANK[b.rarity]) || a.name.localeCompare(b.name));
  const rows = list.map(c => {
    const [ab, cls] = RARITY_BADGE[c.rarity] || ['', ''];
    return `<div class="pp-row ${c.idx === idx ? 'cur' : ''}" onclick="showDetail(BYIDX.get(${c.idx}))">
      <span class="rr ${cls}">${ab}</span><span class="nm">${esc(c.name)}</span></div>`;
  }).join('');
  const pp = document.getElementById('packpop');
  pp.innerHTML = `<div class="pp-head">${meta.img ? `<img src="${meta.img}" alt="">` : ''}
    <div><div class="pp-title">${esc(meta.full)}</div>
    <div class="pp-sub">${esc(code)} · ${list.length} card${list.length === 1 ? '' : 's'}</div></div></div>
    <div class="pp-list">${rows}</div>`;
  pp.classList.add('show');
  const r = el.getBoundingClientRect();
  let x = Math.min(r.left, innerWidth - 332);
  let y = r.bottom + 8;
  if (y + pp.offsetHeight > innerHeight - 8) y = Math.max(8, r.top - 8 - pp.offsetHeight);
  pp.style.left = x + 'px'; pp.style.top = y + 'px';
}
function packPopLeave() {
  packTimer = setTimeout(() => document.getElementById('packpop').classList.remove('show'), 180);
}

// ---- init ----
if (DB) {
  buildSearchIn(); buildFilters(); buildHead();

  const rowsEl = document.getElementById('rows');
  rowsEl.onclick = e => { const tr = e.target.closest('tr'); if (tr) showDetail(BYIDX.get(+tr.dataset.i)); };

  const preview = document.getElementById('preview');
  const badImg = new Set();
  let prevUrl = null;
  preview.onerror = () => { badImg.add(preview.src); preview.style.display = 'none'; };
  const hidePreview = () => { preview.style.display = 'none'; prevUrl = null; };
  rowsEl.addEventListener('mousemove', e => {
    const tr = e.target.closest('tr');
    const c = tr && BYIDX.get(+tr.dataset.i);
    const url = c && imgSmall(c);
    if (!url || badImg.has(url)) return hidePreview();
    if (url !== prevUrl) { prevUrl = url; preview.src = url; }
    preview.style.display = 'block';
    const w = 176, h = 254;
    let x = e.clientX + 20; if (x + w > innerWidth) x = e.clientX - w - 20;
    const y = Math.max(8, Math.min(e.clientY - h / 2, innerHeight - h - 8));
    preview.style.left = x + 'px'; preview.style.top = y + 'px';
  });
  rowsEl.addEventListener('mouseleave', hidePreview);

  const q = document.getElementById('q');
  let t; q.oninput = () => { clearTimeout(t); t = setTimeout(render, 90); };
  const packpop = document.getElementById('packpop');
  packpop.addEventListener('mouseenter', () => clearTimeout(packTimer));
  packpop.addEventListener('mouseleave', packPopLeave);
  document.getElementById('detail').onclick = e => {
    if (e.target.id === 'detail') { e.target.classList.remove('show'); packpop.classList.remove('show'); }
  };
  document.getElementById('zoom').onclick = () => document.getElementById('zoom').classList.remove('show');
  document.addEventListener('keydown', e => {
    if (e.key === 'Escape') {
      const z = document.getElementById('zoom'), d = document.getElementById('detail');
      if (packpop.classList.contains('show')) packpop.classList.remove('show');
      else if (z.classList.contains('show')) z.classList.remove('show');
      else if (d.classList.contains('show')) d.classList.remove('show');
      else { q.value=''; render(); q.focus(); }
    }
  });
  render();
}
</script>
</body>
</html>
